server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers (2026-07-11 prod-ready audit) ──────────────────────
    # Declared at the `server` level (not inside `location /`) so nginx's
    # add_header inheritance carries them into every location block below —
    # inheritance ONLY happens when a location has NO add_header of its own;
    # if a future location block (e.g. a dedicated cache-control rule for
    # /assets/) adds its own add_header, nginx drops ALL server-level headers
    # for that location and the full set below must be repeated there.
    #
    # CSP origins are MEASURED, not guessed — grepped from src/, index.html,
    # vite.config.ts (2026-07-11):
    #   - connect-src / media-src: https://api.supabase.duin.home is the ONLY
    #     external origin the app talks to (src/lib/supabase.ts VITE_SUPABASE_URL;
    #     audioService.ts / lessonService.ts / textService.ts build storage
    #     URLs off the same host — Kong fronts PostgREST, GoTrue, AND Storage
    #     on one origin, so one entry covers API + audio/TTS/podcast files).
    #   - media-src blob:: src/lib/pronunciation/shadowRecorder.ts creates a
    #     blob: URL from the learner's own mic recording (shadowing exercise,
    #     ADR 0025) and plays it back via `new Audio(blobUrl)`.
    #   - style-src 'unsafe-inline': Mantine v8's useMantineColorScheme hook
    #     (dark/light toggle) injects a real <style> element at runtime via
    #     document.createElement('style') to suppress transitions during the
    #     scheme switch (node_modules/@mantine/core/.../use-mantine-color-scheme.mjs)
    #     — a nonce-based CSP isn't available on a static file server (nonces
    #     must be unique per response, which needs server-side templating).
    #     Mantine also sets many `style=""` attributes for dynamic values,
    #     which the same directive covers.
    #   - script-src has NO 'unsafe-inline': `bun run build` output
    #     (dist/index.html) has zero inline <script> tags — only
    #     `<script type="module" src="...">` — and the app never uses eval()
    #     or new Function().
    #   - font-src 'self' only: Google Fonts is no longer loaded (see
    #     src/styles/fonts.css) — 'Plus Jakarta Sans' is self-hosted under
    #     /fonts/.
    #   - worker-src 'self': the PWA service worker
    #     (src/components/PwaUpdatePrompt.tsx) registers '/sw.js', same-origin.
    #   - manifest-src 'self': /manifest.webmanifest (vite-plugin-pwa), same-origin.
    #   - img-src adds data: and blob: as a standard defensive allowance for
    #     UI-library-generated images; no current code path was found needing
    #     it, but it costs nothing and Mantine internals may rely on it.
    #
    # ⚠️ When this app migrates off the homelab (cloud migration), the
    # api.supabase.duin.home origin in connect-src/media-src below MUST be
    # updated to the new Supabase project URL, or every API call and every
    # audio/TTS/podcast playback will be silently blocked by the browser.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.supabase.duin.home; media-src 'self' blob: https://api.supabase.duin.home; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # max-age=15552000 (180 days). No `preload` (irreversible submission to
    # browser preload lists) and no `includeSubDomains` — .duin.home is a
    # shared parent domain (family-hub and other homelab services live on
    # sibling subdomains that are not all HTTPS-only).
    add_header Strict-Transport-Security "max-age=15552000" always;
    # microphone=(self) is load-bearing: the shadowing exercise records the
    # learner's own voice via getUserMedia (src/lib/pronunciation/
    # shadowRecorder.ts:30, ADR 0025). An empty allowlist microphone=() denies
    # mic to the page ITSELF, not just embedded frames — caught post-deploy
    # 2026-07-12. Camera/geolocation stay fully denied (nothing uses them).
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
