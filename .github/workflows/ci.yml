name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Reusable workflows from homelab-platform@v1 declare their own permissions
# (notably semgrep.yml: `security-events: write` for SARIF upload). GitHub
# rejects the run at startup if the caller's permissions are narrower than
# the callee's declared permissions. This block grants the superset.
permissions:
  contents: read
  security-events: write

# Runner topology (2026-07-02 supply-chain hardening — see
# docs/audits/2026-07-02-dependency-supply-chain-audit.md §4.3): this
# workflow triggers on `pull_request` from a PUBLIC repo, so any prior
# contributor (and, per GitHub's default first-time-contributor-approval
# setting, potentially a forked PR after one approval) can cause these jobs
# to execute. None of the three jobs below need homelab-network locality —
# `safety`/`dependencies` are pure static analysis + GitHub API calls,
# `seam-contract` is a repo-local bash scan — so every job runs on
# GitHub-hosted `ubuntu-latest`, never on the self-hosted `master-docker`
# runner that also hosts production and the Supabase keys.
jobs:
  safety:
    # Pinned to a commit SHA (not the movable `v1` tag): this job carries
    # `secrets: inherit`, so a tag-move in homelab-platform would otherwise
    # be a silent path to this repo's secrets (audit finding, §4.3).
    uses: AlbertvD/homelab-platform/.github/workflows/safety.yml@cf5f7735eb3512ed2dec00eb45c33fca91131542 # v1
    with:
      runner: ubuntu-latest
    secrets: inherit

  dependencies:
    uses: AlbertvD/homelab-platform/.github/workflows/dependency-audit.yml@cf5f7735eb3512ed2dec00eb45c33fca91131542 # v1
    with:
      fail_on_vulnerabilities: false
      runner: ubuntu-latest

  seam-contract:
    name: Seam contract — viewport-math scan
    # Pure bash scan of repo source (scripts/check-viewport-math.sh) — no
    # homelab dependency.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Run viewport-math scanner
        run: bash scripts/check-viewport-math.sh
