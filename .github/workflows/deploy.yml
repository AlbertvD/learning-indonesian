name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Not `pull_request`-triggered — `workflow_run` only fires after CI
    # succeeds on `main`, and `workflow_dispatch` requires repo write access —
    # so this job isn't exposed to the fork-PR attack the topology hardening
    # targets (docs/audits/2026-07-02-dependency-supply-chain-audit.md §4.3
    # action #1). Moved off the self-hosted `master-docker` runner anyway:
    # the build needs no homelab-network locality (base images come from
    # public registries; VITE_SUPABASE_URL/ANON_KEY are baked in as literal
    # build-arg strings, never resolved over the network during build;
    # registry auth is the ephemeral GITHUB_TOKEN, not a homelab secret) and
    # GitHub-hosted minutes are free for public repos.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        # --ignore-scripts skips the `prepare: husky` lifecycle — husky is a
        # local-dev-only git-hooks tool with no purpose in CI.
        run: bun install --ignore-scripts

      - name: Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
