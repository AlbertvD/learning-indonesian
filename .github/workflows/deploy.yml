name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Not `pull_request`-triggered — `workflow_run` only fires after CI
    # succeeds on `main`, and `workflow_dispatch` requires repo write access —
    # so this job isn't exposed to the fork-PR attack the topology hardening
    # targets (docs/audits/2026-07-02-dependency-supply-chain-audit.md §4.3
    # action #1). Moved off the self-hosted `master-docker` runner anyway:
    # the build needs no homelab-network locality (base images come from
    # public registries; VITE_SUPABASE_URL/ANON_KEY are baked in as literal
    # build-arg strings, never resolved over the network during build;
    # registry auth is the ephemeral GITHUB_TOKEN, not a homelab secret) and
    # GitHub-hosted minutes are free for public repos.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        # --ignore-scripts skips the `prepare: husky` lifecycle — husky is a
        # local-dev-only git-hooks tool with no purpose in CI.
        run: bun install --ignore-scripts

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
